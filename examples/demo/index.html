<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebDesign AI Editor - Demo</title>
  <style>
    :root { font-family: Inter, system-ui, sans-serif; color: #172033; background: #f4f7fb; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; }
    .hero { min-height: 72vh; display: grid; place-items: center; padding: 64px 24px; }
    .card { width: min(760px, 100%); padding: 56px; border-radius: 28px; background: white; box-shadow: 0 24px 70px rgba(27, 39, 67, .12); text-align: center; }
    .eyebrow { margin: 0 0 16px; font-size: 14px; font-weight: 750; letter-spacing: .12em; text-transform: uppercase; color: #6254e7; }
    h1 { margin: 0; font-size: clamp(40px, 7vw, 76px); line-height: .98; letter-spacing: -.055em; }
    .subtitle { max-width: 560px; margin: 24px auto 0; font-size: 20px; line-height: 1.55; color: #5f6980; }
    .actions { display: flex; justify-content: center; gap: 14px; margin-top: 34px; flex-wrap: wrap; }
    .button { display: inline-flex; align-items: center; justify-content: center; min-width: 160px; min-height: 48px; padding: 12px 20px; border: 0; border-radius: 999px; font: inherit; font-weight: 750; cursor: pointer; }
    .button-primary { background: #6254e7; color: white; }
    .button-secondary { background: #edf0f7; color: #202a40; }
  </style>
</head>
<body>
  <main class="hero">
    <section class="card" data-testid="hero-card">
      <p class="eyebrow">Demo local</p>
      <h1 id="hero-title">Edite esta página visualmente</h1>
      <p class="subtitle">Selecione qualquer elemento, mova, redimensione, rotacione, alinhe com smart guides ou use o painel e um prompt local.</p>
      <div class="actions">
        <button class="button button-primary">Começar</button>
        <button class="button button-secondary">Documentação</button>
      </div>
    </section>
  </main>
</body>
</html>
