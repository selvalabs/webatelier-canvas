name: Feature
about: Nova funcionalidade com escopo e critérios verificáveis
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Qual problema ou capacidade ausente será tratado?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Liste as mudanças incluídas.
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: Declare explicitamente o que não será alterado.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      value: |
        - [ ] `uv run ruff check .`
        - [ ] `uv run pytest`
        - [ ] `uv run mypy src`
        - [ ] `npm run --prefix editor-runtime typecheck`
        - [ ] `npm run --prefix editor-runtime build`
    validations:
      required: true
