name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest-exporter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --extra dev
      - run: uv run pytest tests/test_exporter.py -q

  pytest-export-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --extra dev
      - run: uv run pytest tests/test_export_api.py -q

  pytest-existing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen --extra dev
      - run: uv run pytest --ignore=tests/test_exporter.py --ignore=tests/test_export_api.py -q

  python:
    needs: [pytest-exporter, pytest-export-api, pytest-existing]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run mypy src

  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor-runtime/package-lock.json
      - run: npm ci --prefix editor-runtime
      - run: npm run --prefix editor-runtime typecheck
      - run: node scripts/check-runtime-extensions.mjs
      - run: npm run --prefix editor-runtime build
      - name: Verify committed runtime bundle
        run: git diff --exit-code -- src/webdesign_ai_editor/static/editor-runtime.js src/webdesign_ai_editor/static/editor-runtime.js.map
