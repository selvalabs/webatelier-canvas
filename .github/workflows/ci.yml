name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  discover-tests:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.collect.outputs.files }}
    steps:
      - uses: actions/checkout@v4
      - id: collect
        shell: bash
        run: |
          files=$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.dumps([str(path) for path in sorted(Path('tests').glob('test_*.py'))]))
          PY
          )
          echo "files=$files" >> "$GITHUB_OUTPUT"

  python-files:
    needs: discover-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJSON(needs.discover-tests.outputs.files) }}
    name: python (${{ matrix.file }})
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run pytest "${{ matrix.file }}" -q

  python:
    needs: python-files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check .
      - run: uv run pytest -q
      - run: uv run mypy src

  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor-runtime/package-lock.json
      - run: npm ci --prefix editor-runtime
      - run: npm run --prefix editor-runtime typecheck
      - run: node scripts/check-runtime-extensions.mjs
      - run: npm run --prefix editor-runtime build
      - name: Verify committed runtime bundle
        run: git diff --exit-code -- src/webdesign_ai_editor/static/editor-runtime.js src/webdesign_ai_editor/static/editor-runtime.js.map
