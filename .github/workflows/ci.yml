name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - name: Probe export models
        continue-on-error: true
        run: uv run ruff check src/webdesign_ai_editor/domain/export_models.py
      - name: Probe exporter service
        continue-on-error: true
        run: uv run ruff check src/webdesign_ai_editor/services/exporter.py
      - name: Probe browser host
        continue-on-error: true
        run: uv run ruff check src/webdesign_ai_editor/adapters/browser_host.py
      - name: Probe API app
        continue-on-error: true
        run: uv run ruff check src/webdesign_ai_editor/api/app.py
      - name: Probe export CLI
        continue-on-error: true
        run: uv run ruff check src/webdesign_ai_editor/export_cli.py
      - name: Probe exporter tests
        continue-on-error: true
        run: uv run ruff check tests/test_exporter.py
      - name: Probe export API tests
        continue-on-error: true
        run: uv run ruff check tests/test_export_api.py
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run mypy src

  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor-runtime/package-lock.json
      - run: npm ci --prefix editor-runtime
      - run: npm run --prefix editor-runtime typecheck
      - run: node scripts/check-runtime-extensions.mjs
      - run: npm run --prefix editor-runtime build
      - name: Verify committed runtime bundle
        run: git diff --exit-code -- src/webdesign_ai_editor/static/editor-runtime.js src/webdesign_ai_editor/static/editor-runtime.js.map
