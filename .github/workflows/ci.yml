name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check .
      - name: Test insertion models
        run: uv run pytest tests/test_element_insertion_models.py -q
      - name: Probe API tests
        continue-on-error: true
        run: uv run pytest tests/test_api.py -q
      - name: Probe browser host tests
        continue-on-error: true
        run: uv run pytest tests/test_browser_host.py -q
      - name: Probe CLI tests
        continue-on-error: true
        run: uv run pytest tests/test_cli.py -q
      - name: Probe domain model tests
        continue-on-error: true
        run: uv run pytest tests/test_domain_models.py -q
      - name: Probe JSONL repository tests
        continue-on-error: true
        run: uv run pytest tests/test_jsonl_patch_repository.py -q
      - name: Probe local demo tests
        continue-on-error: true
        run: uv run pytest tests/test_local_demo.py -q
      - name: Probe Ollama tests
        continue-on-error: true
        run: uv run pytest tests/test_ollama.py -q
      - name: Probe patch session API tests
        continue-on-error: true
        run: uv run pytest tests/test_patch_session_api.py -q
      - name: Test complete Python suite
        run: uv run pytest -q
      - run: uv run mypy src

  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor-runtime/package-lock.json
      - run: npm ci --prefix editor-runtime
      - run: npm run --prefix editor-runtime typecheck
      - run: node scripts/check-runtime-extensions.mjs
      - run: npm run --prefix editor-runtime build
      - name: Verify committed runtime bundle
        run: git diff --exit-code -- src/webdesign_ai_editor/static/editor-runtime.js src/webdesign_ai_editor/static/editor-runtime.js.map
