name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  discover-python:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.collect.outputs.files }}
    steps:
      - uses: actions/checkout@v4
      - id: collect
        shell: bash
        run: |
          files=$(python - <<'PY'
          import json
          from pathlib import Path
          roots = [Path('src'), Path('tests')]
          paths = [str(path) for root in roots for path in sorted(root.rglob('*.py'))]
          print(json.dumps(paths))
          PY
          )
          echo "files=$files" >> "$GITHUB_OUTPUT"

  lint-files:
    needs: discover-python
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJSON(needs.discover-python.outputs.files) }}
    name: ruff (${{ matrix.file }})
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check "${{ matrix.file }}"

  python:
    needs: lint-files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run mypy src

  runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor-runtime/package-lock.json
      - run: npm ci --prefix editor-runtime
      - run: npm run --prefix editor-runtime typecheck
      - run: node scripts/check-runtime-extensions.mjs
      - run: npm run --prefix editor-runtime build
      - name: Verify committed runtime bundle
        run: git diff --exit-code -- src/webdesign_ai_editor/static/editor-runtime.js src/webdesign_ai_editor/static/editor-runtime.js.map
